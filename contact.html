<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Rickards Key Club</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="nav-content">
            <img src="icon.png" alt="small-logo" class="small-logo">
            <a href="index.html" class="nav-logo">Rickards Key Club</a>
            <div class="nav-links">
                <a href="mission.html">Mission</a>
                <a href="teams.html">Team</a>
                <a href="pastEvents.html">Past Events</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="contact-hero">
        <h1>Contact Us</h1>
        <p>We’d love to hear from you!</p>
    </section>

    <!-- CONTACT -->
    <section class="contact-container">

        <!-- LEFT -->
        <div class="contact-info">
            <h2>Get in Touch</h2>

            <div class="contact-item">
                <h3>Email</h3>
                <a href="mailto:rickardskeyclub@gmail.com">rickardskeyclub@gmail.com</a>
            </div>

            <div class="contact-item">
                <h3>Instagram</h3>
                <a href="https://instagram.com/rickardskeyclub" target="_blank">@rickardskeyclub</a>
            </div>

            <div class="contact-item">
                <h3>Location</h3>
                <p>Rickards High School<br>Tallahassee, Florida</p>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="contact-form">
            <h2>Send a Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="button primary">Send Message</button>
            </form>
        </div>

    </section>

    <!-- MAP -->
    <section class="map-section">
        <h2 class="section-title">Find Us</h2>

        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps?q=Rickards+High+School+Tallahassee&output=embed"
                width="100%" 
                height="400" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>
    </section>
    
    <footer>
        <div class="footer-content">
            <p>&copy; 2025 Rickards Key Club. All rights reserved.</p>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
    
</body>
</html>
